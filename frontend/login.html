<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Back2You | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{colors:{deep:"#020617",text:"#f5f7fb",muted:"#8e97ab",blueglow:"#4f7cff",violetglow:"#8b3dff",cyanglow:"#33d2ff"},fontFamily:{sans:["Outfit","sans-serif"]},boxShadow:{panel:"0 30px 90px rgba(0,0,0,.55)",glow:"0 0 38px rgba(79,124,255,.22)"}}}}
</script>
<style>
  :root{color-scheme:dark}
  body{font-family:"Outfit",sans-serif;background:radial-gradient(circle at 10% 8%,rgba(79,124,255,.28),transparent 24%),radial-gradient(circle at 82% 86%,rgba(139,61,255,.24),transparent 26%),radial-gradient(circle at 50% 52%,rgba(51,210,255,.1),transparent 28%),linear-gradient(180deg,#121742 0%,#15133b 38%,#171227 100%);overflow-x:hidden}
  .glass{background:rgba(18,22,50,.7);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08)}
  .action-pill{position:relative;display:inline-flex;align-items:center;gap:.75rem;width:100%;padding:.38rem .38rem .38rem 1.35rem;border-radius:999px;transition:transform .25s ease,box-shadow .25s ease}
  .action-pill:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(79,124,255,.18)}
  .action-pill__label{flex:1;text-align:center}
  .action-pill__icon{display:inline-flex;height:3rem;width:3rem;align-items:center;justify-content:center;border-radius:999px;transition:transform .28s ease}
  .action-pill:hover .action-pill__icon{transform:translateX(4px) scale(1.04)}
  .form-input{background:rgba(255,255,255,.92)!important;color:#111827!important}
  .form-input::placeholder{color:#8490a8!important}
  .form-input:focus{border-color:#8b3dff!important;box-shadow:0 0 0 1px rgba(139,61,255,.4)!important}
  .form-input:-webkit-autofill,.form-input:-webkit-autofill:hover,.form-input:-webkit-autofill:focus{-webkit-text-fill-color:#111827;-webkit-box-shadow:0 0 0 1000px rgba(255,255,255,.92) inset;transition:background-color 9999s ease-out 0s}
  .password-toggle{position:absolute;right:1rem;top:50%;display:flex;height:2.5rem;width:2.5rem;align-items:center;justify-content:center;transform:translateY(-50%);border-radius:999px;color:#475569;transition:background-color .2s ease,color .2s ease}
  .password-toggle:hover{background:rgba(15,23,42,.08);color:#111827}
</style>
</head>
<body class="min-h-screen text-text">
<header class="border-b border-white/8 bg-[#13183f]/70 backdrop-blur-xl">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-5 lg:px-8">
    <div class="flex items-center gap-4"><div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-blueglow to-violetglow text-white shadow-glow sm:h-12 sm:w-12"><svg class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H7a2 2 0 00-2 2v9a1 1 0 001 1h9a2 2 0 002-2v-3m-1-8h3m0 0v3m0-3L10 14"/></svg></div><p class="text-2xl font-extrabold text-white sm:text-3xl">Back2You</p></div>
    <div class="hidden items-center gap-6 md:flex"><a href="index.html" class="text-base font-semibold text-text/75 transition hover:text-white">Home</a><a href="dashboard.html" class="rounded-full bg-white px-5 py-2.5 text-base font-bold text-deep transition hover:bg-white/90 sm:px-7">Login</a></div>
  </div>
</header>
<main class="mx-auto flex min-h-[calc(100vh-81px)] max-w-7xl items-center justify-center px-4 py-8 sm:px-5 lg:px-8">
  <section class="glass w-full max-w-md rounded-[1.75rem] p-6 shadow-panel sm:max-w-lg sm:p-8">
    <div class="mb-6 flex items-start justify-between"><h1 class="text-3xl font-extrabold text-white sm:text-4xl">Welcome Back</h1><a href="index.html" class="text-3xl leading-none text-text/65 transition hover:text-white">&times;</a></div>
    <form id="loginForm" class="space-y-5">
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Email Address</span><input id="emailOrRollNumber" class="form-input w-full rounded-2xl border border-white/10 px-4 py-3.5 text-lg placeholder:text-muted focus:ring-0 sm:px-5 sm:py-4 sm:text-xl" type="text" placeholder="you@university.edu or 22CS1042"/></label>
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Password</span><span class="relative block"><input id="passwordInput" type="password" class="form-input w-full rounded-2xl border border-white/10 px-4 py-3.5 pr-14 text-lg placeholder:text-muted focus:ring-0 sm:px-5 sm:py-4 sm:text-xl" placeholder="Enter your password"/><button id="passwordToggle" type="button" class="password-toggle" aria-label="Show password" aria-pressed="false"><svg id="eyeOpen" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.27 2.943 9.542 7-1.272 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z"/><circle cx="12" cy="12" r="3"/></svg><svg id="eyeClosed" class="hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/><path stroke-linecap="round" stroke-linejoin="round" d="M10.584 10.587A2 2 0 0013.414 13.417"/><path stroke-linecap="round" stroke-linejoin="round" d="M9.88 5.09A10.94 10.94 0 0112 5c4.478 0 8.27 2.943 9.542 7a10.961 10.961 0 01-4.125 5.168"/><path stroke-linecap="round" stroke-linejoin="round" d="M6.228 6.233A10.96 10.96 0 002.458 12c1.274 4.057 5.065 7 9.542 7a10.96 10.96 0 005.051-1.233"/></svg></button></span></label>
      <button type="submit" class="action-pill bg-gradient-to-r from-blueglow to-violetglow text-white shadow-glow"><span class="action-pill__label text-lg font-bold sm:text-xl">Sign In</span><span class="action-pill__icon bg-white text-deep"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-6-6l6 6-6 6"/></svg></span></button>
    </form>
    <p class="mt-6 text-center text-base text-text/65 sm:text-lg">Don't have an account? <a href="register.html" class="font-semibold text-blueglow">Sign Up</a></p>
  </section>
</main>
<script src="js/app.js"></script>
<script>
  const passwordInput=document.getElementById("passwordInput");
  const passwordToggle=document.getElementById("passwordToggle");
  const eyeOpen=document.getElementById("eyeOpen");
  const eyeClosed=document.getElementById("eyeClosed");

  passwordToggle.addEventListener("click",()=>{
    const isHidden=passwordInput.type==="password";
    passwordInput.type=isHidden?"text":"password";
    passwordToggle.setAttribute("aria-label",isHidden?"Hide password":"Show password");
    passwordToggle.setAttribute("aria-pressed",String(isHidden));
    eyeOpen.classList.toggle("hidden",isHidden);
    eyeClosed.classList.toggle("hidden",!isHidden);
  });

  document.getElementById("loginForm").addEventListener("submit", async (event) => {
    event.preventDefault();

    try {
      const response = await Back2YouAPI.request("/auth/login", {
        method: "POST",
        body: JSON.stringify({
          emailOrRollNumber: document.getElementById("emailOrRollNumber").value.trim(),
          password: document.getElementById("passwordInput").value
        })
      });

      Back2YouAPI.setSession(response.data);
      location.href = "dashboard.html";
    } catch (error) {
      alert(error.message);
    }
  });
</script>
</body>
</html>
