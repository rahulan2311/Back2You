<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Back2You | Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{colors:{deep:"#020617",text:"#f5f7fb",muted:"#8e97ab",blueglow:"#4f7cff",violetglow:"#8b3dff",cyanglow:"#33d2ff"},fontFamily:{sans:["Outfit","sans-serif"]},boxShadow:{panel:"0 30px 90px rgba(0,0,0,.55)",glow:"0 0 38px rgba(79,124,255,.22)"}}}}
</script>
<style>
  :root{color-scheme:dark}
  body{font-family:"Outfit",sans-serif;background:radial-gradient(circle at 10% 8%,rgba(79,124,255,.28),transparent 24%),radial-gradient(circle at 82% 86%,rgba(139,61,255,.24),transparent 26%),radial-gradient(circle at 50% 52%,rgba(51,210,255,.1),transparent 28%),linear-gradient(180deg,#121742 0%,#15133b 38%,#171227 100%);overflow-x:hidden}
  .glass{background:rgba(18,22,50,.7);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08)}
  .action-pill{position:relative;display:inline-flex;align-items:center;gap:.75rem;width:100%;padding:.38rem .38rem .38rem 1.35rem;border-radius:999px;transition:transform .25s ease,box-shadow .25s ease}
  .action-pill:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(79,124,255,.18)}
  .action-pill__label{flex:1;text-align:center}
  .action-pill__icon{display:inline-flex;height:3rem;width:3rem;align-items:center;justify-content:center;border-radius:999px;transition:transform .28s ease}
  .action-pill:hover .action-pill__icon{transform:translateX(4px) scale(1.04)}
  .back-pill{display:inline-flex;align-items:center;gap:.7rem;border-radius:999px;background:#343434;padding:.8rem 1.35rem;font-size:.95rem;font-weight:500;color:#fff;transition:transform .25s ease,background-color .25s ease,box-shadow .25s ease}
  .back-pill:hover{transform:translateY(-2px);background:#3c3c3c;box-shadow:0 12px 28px rgba(0,0,0,.28)}
  .back-pill__icon,.back-pill__label{transition:transform .25s ease}
  .back-pill:hover .back-pill__icon,.back-pill:hover .back-pill__label{transform:translateX(-2px)}
  @media (max-width:640px){.back-pill{padding:.68rem 1rem;font-size:.88rem}}
</style>
</head>
<body class="min-h-screen text-text">
<header class="border-b border-white/8 bg-[#13183f]/70 backdrop-blur-xl">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-5 lg:px-8">
    <div class="flex items-center gap-4"><div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-blueglow to-violetglow text-white shadow-glow sm:h-12 sm:w-12"><svg class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H7a2 2 0 00-2 2v9a1 1 0 001 1h9a2 2 0 002-2v-3m-1-8h3m0 0v3m0-3L10 14"/></svg></div><p class="text-2xl font-extrabold text-white sm:text-3xl">Back2You</p></div>
    <div class="hidden items-center gap-6 md:flex"><a href="index.html" class="text-base font-semibold text-text/75 transition hover:text-white">Home</a><a href="login.html" class="rounded-full bg-white px-5 py-2.5 text-base font-bold text-deep transition hover:bg-white/90 sm:px-7">Login</a></div>
  </div>
</header>
<main class="mx-auto flex min-h-[calc(100vh-81px)] max-w-7xl items-center justify-center px-4 py-8 sm:px-5 lg:px-8">
  <section class="glass w-full max-w-md rounded-[1.75rem] p-6 shadow-panel sm:max-w-lg sm:p-8">
    <div class="mb-6 flex flex-col items-start gap-3 sm:flex-row sm:items-center"><a href="index.html" class="back-pill sm:shrink-0"><span class="back-pill__icon text-[1.45rem] leading-none">&#8249;</span><span class="back-pill__label">Back</span></a><h1 class="text-3xl font-extrabold text-white sm:text-4xl">Create Account</h1></div>
    <form class="space-y-5" id="registerForm">
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Full Name</span><input id="fullName" class="w-full rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-lg text-white placeholder:text-muted focus:border-blueglow focus:ring-blueglow sm:px-5 sm:py-4 sm:text-xl" placeholder="Your full name"/></label>
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Email Address</span><input class="w-full rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-lg text-white placeholder:text-muted focus:border-blueglow focus:ring-blueglow sm:px-5 sm:py-4 sm:text-xl" placeholder="you@university.edu"/></label>
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Roll Number</span><input class="w-full rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-lg text-white placeholder:text-muted focus:border-blueglow focus:ring-blueglow sm:px-5 sm:py-4 sm:text-xl" placeholder="22CS1042"/></label>
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Password</span><input type="password" class="w-full rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-lg text-white placeholder:text-muted focus:border-violetglow focus:ring-violetglow sm:px-5 sm:py-4 sm:text-xl" placeholder="........"/></label>
      <button type="submit" class="action-pill bg-gradient-to-r from-blueglow to-violetglow text-white shadow-glow"><span class="action-pill__label text-lg font-bold sm:text-xl">Sign Up</span><span class="action-pill__icon bg-white text-deep"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-6-6l6 6-6 6"/></svg></span></button>
    </form>
    <p class="mt-6 text-center text-base text-text/65 sm:text-lg">Already have an account? <a href="login.html" class="font-semibold text-blueglow">Sign In</a></p>
  </section>
</main>
<script src="js/app.js"></script>
<script>
document.getElementById("registerForm").addEventListener("submit", async function (event) {
  event.preventDefault();

  const fullName = document.getElementById("fullName").value.trim();
  const email = document.querySelector('input[placeholder="you@university.edu"]').value.trim();
  const rollNumber = document.querySelector('input[placeholder="22CS1042"]').value.trim();
  const password = document.querySelector('input[type="password"]').value;

  try {
    const response = await Back2YouAPI.request("/auth/register", {
      method: "POST",
      body: JSON.stringify({
        name: fullName,
        email,
        rollNumber,
        password
      })
    });

    Back2YouAPI.setSession(response.data);
    location.href = "dashboard.html";
  } catch (error) {
    alert(error.message);
  }
});
</script>
</body>
</html>
