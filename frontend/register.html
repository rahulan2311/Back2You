<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Back2You | Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/ambient-bg.css"/>
<script>
tailwind.config={theme:{extend:{colors:{deep:"#020617",text:"#f5f7fb",muted:"#8e97ab",blueglow:"#4f7cff",violetglow:"#8b3dff",cyanglow:"#33d2ff",danger:"#fb7185"},fontFamily:{sans:["Outfit","sans-serif"]},boxShadow:{panel:"0 30px 90px rgba(0,0,0,.55)",glow:"0 0 38px rgba(79,124,255,.22)"}}}}
</script>
<style>
  :root{color-scheme:dark}
  body{font-family:"Outfit",sans-serif;background:radial-gradient(circle at 10% 8%,rgba(79,124,255,.28),transparent 24%),radial-gradient(circle at 82% 86%,rgba(139,61,255,.24),transparent 26%),radial-gradient(circle at 50% 52%,rgba(51,210,255,.1),transparent 28%),linear-gradient(180deg,#121742 0%,#15133b 38%,#171227 100%);overflow-x:hidden}
  .glass{background:rgba(18,22,50,.7);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08)}
  .action-pill{position:relative;display:inline-flex;align-items:center;gap:.75rem;width:100%;padding:.38rem .38rem .38rem 1.35rem;border-radius:999px;transition:transform .25s ease,box-shadow .25s ease}
  .action-pill:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(79,124,255,.18)}
  .action-pill__label{flex:1;text-align:center}
  .action-pill__icon{display:inline-flex;height:3rem;width:3rem;align-items:center;justify-content:center;border-radius:999px;transition:transform .28s ease}
  .action-pill:hover .action-pill__icon{transform:translateX(4px) scale(1.04)}
  .back-pill{display:inline-flex;height:3rem;width:3rem;align-items:center;justify-content:center;border-radius:999px;border:1px solid rgba(255,255,255,.09);background:rgba(5,8,20,.52);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 26px rgba(0,0,0,.24);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:transform .25s ease,border-color .25s ease,background-color .25s ease,box-shadow .25s ease}
  .back-pill:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.18);background:rgba(8,12,28,.72);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 14px 30px rgba(0,0,0,.32)}
  .back-pill__icon{display:inline-flex;align-items:center;justify-content:center;transition:transform .25s ease}
  .back-pill:hover .back-pill__icon{transform:translateX(-2px)}
  .back-pill__label{display:none}
  .form-input{background:rgba(255,255,255,.92)!important;color:#111827!important}
  .form-input::placeholder{color:#8490a8!important}
  .form-input:focus{border-color:#8b3dff!important;box-shadow:0 0 0 1px rgba(139,61,255,.4)!important}
  .form-input:-webkit-autofill,.form-input:-webkit-autofill:hover,.form-input:-webkit-autofill:focus{-webkit-text-fill-color:#111827;-webkit-box-shadow:0 0 0 1000px rgba(255,255,255,.92) inset;transition:background-color 9999s ease-out 0s}
  .helper-box{display:none;margin-top:1rem;border-radius:1rem;padding:.85rem 1rem;font-size:.95rem;line-height:1.5}
  .helper-box--error{display:block;border:1px solid rgba(251,113,133,.35);background:rgba(251,113,133,.12);color:#ffe4e6}
  .helper-box--success{display:block;border:1px solid rgba(74,222,128,.3);background:rgba(74,222,128,.12);color:#dcfce7}
  @media (max-width:640px){.back-pill{height:2.75rem;width:2.75rem}}
</style>
</head>
<body class="min-h-screen text-text">
<header class="border-b border-white/8 bg-[#13183f]/70 backdrop-blur-xl">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-5 lg:px-8">
    <div class="flex items-center gap-4"><p class="text-2xl font-extrabold text-white sm:text-3xl">Back2You</p></div>
    <div class="hidden items-center gap-6 md:flex"><a href="index.html" class="text-base font-semibold text-text/75 transition hover:text-white">Home</a><a href="login.html" class="rounded-full bg-white px-5 py-2.5 text-base font-bold text-deep transition hover:bg-white/90 sm:px-7">Login</a></div>
  </div>
</header>
<main class="mx-auto flex min-h-[calc(100vh-81px)] max-w-7xl items-center justify-center px-4 py-8 sm:px-5 lg:px-8">
  <section class="glass w-full max-w-md rounded-[1.75rem] p-6 shadow-panel sm:max-w-lg sm:p-8">
    <div class="mb-6 flex flex-col items-start gap-3 sm:flex-row sm:items-center"><a href="index.html" class="back-pill sm:shrink-0" aria-label="Go back"><span class="back-pill__icon"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg></span><span class="back-pill__label">Back</span></a><h1 class="text-3xl font-extrabold text-white sm:text-4xl">Create Account</h1></div>
    <form class="space-y-5" id="registerForm">
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Full Name</span><input id="fullName" class="form-input w-full rounded-2xl border border-white/10 px-4 py-3.5 text-lg placeholder:text-muted focus:ring-0 sm:px-5 sm:py-4 sm:text-xl" placeholder="Your full name" required/></label>
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Email Address</span><input id="registerEmail" class="form-input w-full rounded-2xl border border-white/10 px-4 py-3.5 text-lg placeholder:text-muted focus:ring-0 sm:px-5 sm:py-4 sm:text-xl" type="email" placeholder="you@university.edu" required/></label>
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Roll Number</span><input id="rollNumber" class="form-input w-full rounded-2xl border border-white/10 px-4 py-3.5 text-lg placeholder:text-muted focus:ring-0 sm:px-5 sm:py-4 sm:text-xl" placeholder="22CS1042" required/></label>
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Password</span><input id="registerPassword" type="password" class="form-input w-full rounded-2xl border border-white/10 px-4 py-3.5 text-lg placeholder:text-muted focus:ring-0 sm:px-5 sm:py-4 sm:text-xl" placeholder="Enter password" required/></label>
      <label class="block"><span class="mb-2.5 block text-lg font-medium text-text/70 sm:text-xl">Confirm Password</span><input id="confirmPassword" type="password" class="form-input w-full rounded-2xl border border-white/10 px-4 py-3.5 text-lg placeholder:text-muted focus:ring-0 sm:px-5 sm:py-4 sm:text-xl" placeholder="Re-enter password" required/></label>
      <div id="registerMessage" class="helper-box"></div>
      <button type="submit" class="action-pill bg-gradient-to-r from-blueglow to-violetglow text-white shadow-glow"><span class="action-pill__label text-lg font-bold sm:text-xl">Sign Up</span><span class="action-pill__icon bg-white text-deep"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-6-6l6 6-6 6"/></svg></span></button>
    </form>
    <p class="mt-6 text-center text-base text-text/65 sm:text-lg">Already have an account? <a href="login.html" class="font-semibold text-blueglow">Sign In</a></p>
  </section>
</main>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
const registerMessage = document.getElementById("registerMessage");

function showRegisterMessage(message, type) {
  registerMessage.textContent = message;
  registerMessage.className = `helper-box helper-box--${type}`;
}

document.getElementById("registerForm").addEventListener("submit", async function (event) {
  event.preventDefault();

  const fullName = document.getElementById("fullName").value.trim();
  const email = document.getElementById("registerEmail").value.trim();
  const rollNumber = document.getElementById("rollNumber").value.trim();
  const password = document.getElementById("registerPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (password !== confirmPassword) {
    showRegisterMessage("Password and confirm password must match.", "error");
    return;
  }

  if (password.length < 6) {
    showRegisterMessage("Password must be at least 6 characters long.", "error");
    return;
  }

  try {
    const response = await Back2YouAPI.request("/auth/register", {
      method: "POST",
      body: JSON.stringify({
        name: fullName,
        email,
        rollNumber,
        password
      })
    });

    Back2YouAPI.setSession(response.data);
    showRegisterMessage("Account created successfully. Redirecting...", "success");
    setTimeout(() => {
      location.href = "dashboard.html";
    }, 600);
  } catch (error) {
    showRegisterMessage(error.message || "Sign up failed. Check backend URL and try again.", "error");
  }
});
</script>
</body>
</html>
