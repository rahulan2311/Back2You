<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Back2You | Report Found Item</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>
tailwind.config = { theme: { extend: { colors: { deep:"#020617", text:"#f5f7fb", muted:"#8e97ab", blueglow:"#4f7cff", violetglow:"#8b3dff", cyanglow:"#33d2ff" }, fontFamily:{ sans:["Outfit","sans-serif"] }, boxShadow:{ panel:"0 30px 90px rgba(0, 0, 0, 0.55)", glow:"0 0 38px rgba(79, 124, 255, 0.22)" } } } }
</script>
<style>
  :root { color-scheme: dark; }
  body { font-family: "Outfit", sans-serif; background: radial-gradient(circle at 10% 8%, rgba(79, 124, 255, 0.28), transparent 24%), radial-gradient(circle at 82% 86%, rgba(139, 61, 255, 0.24), transparent 26%), radial-gradient(circle at 50% 52%, rgba(51, 210, 255, 0.1), transparent 28%), linear-gradient(180deg, #121742 0%, #15133b 38%, #171227 100%); overflow-x: hidden; }
  .glass { background: rgba(18,22,50,.7); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,.08); }
  .fx-btn { position: relative; overflow: hidden; isolation: isolate; transition: transform .25s ease, box-shadow .25s ease, filter .25s ease; }
  .fx-btn::before { content:""; position:absolute; inset:-120% 30%; background: linear-gradient(120deg, transparent 15%, rgba(255,255,255,.35) 50%, transparent 85%); transform: translateX(-140%) skewX(-18deg); transition: transform .7s ease; z-index:-1; }
  .fx-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(79,124,255,.18); }
  .fx-btn:hover::before { transform: translateX(140%) skewX(-18deg); }
  .motion-btn {
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
    min-width: 220px;
    border-radius: 999px;
    transition: width .45s ease, transform .3s ease, box-shadow .3s ease, background-color .3s ease;
  }
  .motion-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,.08);
    opacity: .5;
    transition: opacity .45s ease;
  }
  .motion-btn .motion-label,
  .motion-btn .motion-icon {
    position: relative;
    z-index: 1;
    transition: transform .45s ease;
  }
  .motion-btn:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 14px 34px rgba(79,124,255,.18);
  }
  .motion-btn:hover::before {
    opacity: 1;
  }
  .motion-btn.motion-next:hover .motion-label,
  .motion-btn.motion-next:hover .motion-icon {
    transform: translateX(10px);
  }
  .motion-btn.motion-back:hover .motion-label,
  .motion-btn.motion-back:hover .motion-icon {
    transform: translateX(-10px);
  }
  .back-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    border-radius: 999px;
    background: #343434;
    padding: 0.8rem 1.35rem;
    font-size: 0.95rem;
    font-weight: 500;
    color: #fff;
    transition: transform .25s ease, background-color .25s ease, box-shadow .25s ease;
  }
  .back-pill:hover {
    transform: translateY(-2px);
    background: #3c3c3c;
    box-shadow: 0 12px 28px rgba(0,0,0,.28);
  }
  .back-pill__icon,
  .back-pill__label {
    transition: transform .25s ease;
  }
  .back-pill:hover .back-pill__icon,
  .back-pill:hover .back-pill__label {
    transform: translateX(-2px);
  }
  @media (max-width: 640px) {
    .back-pill {
      padding: 0.68rem 1rem;
      font-size: 0.88rem;
    }
  }
</style>
</head>
<body class="min-h-screen text-text">
<header class="border-b border-white/8 bg-[#13183f]/70 backdrop-blur-xl">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-5 lg:px-8">
    <div class="flex items-center gap-4"><p class="text-2xl font-extrabold text-white">Back2You</p></div>
    <nav class="hidden items-center gap-8 text-base font-semibold text-text/75 md:flex"><a href="index.html" class="hover:text-white">Home</a><a href="search.html" class="hover:text-white">Search Items</a><a href="dashboard.html" class="hover:text-white">Dashboard</a></nav>
    <a href="dashboard.html" class="rounded-full bg-white px-5 py-2.5 text-base font-bold text-deep">Dashboard</a>
  </div>
</header>
<main class="mx-auto max-w-5xl px-4 py-8 sm:px-5 lg:px-8">
  <section>
    <form id="foundReportForm" class="glass rounded-[1.75rem] p-6 shadow-panel sm:p-8">
      <div class="flex flex-col items-start gap-3 sm:flex-row sm:items-center">
        <a href="dashboard.html" class="back-pill sm:shrink-0">
          <span class="back-pill__icon text-[1.45rem] leading-none">&#8249;</span>
          <span class="back-pill__label">Back</span>
        </a>
        <h2 class="text-2xl font-bold text-white sm:text-3xl">Report Found Item</h2>
      </div>
      <div class="mt-6 grid gap-4 md:grid-cols-2">
        <input id="foundItemName" class="rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-white placeholder:text-muted focus:border-violetglow focus:ring-violetglow" placeholder="Item Name" required/>
        <input id="foundCategory" class="rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-white placeholder:text-muted focus:border-violetglow focus:ring-violetglow" placeholder="Category" required/>
        <input id="foundLocation" class="rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-white placeholder:text-muted focus:border-violetglow focus:ring-violetglow" placeholder="Location Found" required/>
        <input id="foundDate" type="date" class="rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-white focus:border-violetglow focus:ring-violetglow" required/>
        <input id="storedAt" class="md:col-span-2 rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-white placeholder:text-muted focus:border-violetglow focus:ring-violetglow" placeholder="Stored At"/>
        <textarea id="foundDescription" rows="5" class="md:col-span-2 rounded-[1.5rem] border-white/10 bg-white/8 px-4 py-3.5 text-white placeholder:text-muted focus:border-violetglow focus:ring-violetglow" placeholder="Description" required></textarea>
        <input id="foundImage" type="file" class="md:col-span-2 rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-white file:mr-4 file:rounded-full file:border-0 file:bg-white file:px-4 file:py-2 file:text-sm file:font-bold file:text-deep"/>
      </div>
      <div id="foundTrackingMessage" class="mt-5 hidden rounded-[1.25rem] border border-violetglow/25 bg-violetglow/10 px-4 py-3 text-sm text-white"></div>
      <div class="mt-6">
        <button type="submit" class="motion-btn motion-next w-full bg-gradient-to-r from-blueglow to-violetglow px-6 py-4 text-lg font-bold text-white shadow-glow">
          <span class="motion-label">Submit Found Item</span>
          <span class="motion-icon text-xl">&#8250;</span>
        </button>
      </div>
    </form>
  </section>
</main>
<script src="js/app.js"></script>
<script>
Back2YouAPI.requireAuth();

document.getElementById("foundReportForm").addEventListener("submit", async function (event) {
  event.preventDefault();

  const formData = new FormData();
  formData.append("itemName", document.getElementById("foundItemName").value.trim());
  formData.append("category", document.getElementById("foundCategory").value.trim());
  formData.append("eventLocation", document.getElementById("foundLocation").value.trim());
  formData.append("eventDate", document.getElementById("foundDate").value);
  formData.append("storageLocation", document.getElementById("storedAt").value.trim());
  formData.append("description", document.getElementById("foundDescription").value.trim());

  const fileInput = document.getElementById("foundImage");
  if (fileInput.files[0]) {
    formData.append("image", fileInput.files[0]);
  }

  try {
    const response = await Back2YouAPI.request("/items/found", {
      method: "POST",
      body: formData
    });

    const message = document.getElementById("foundTrackingMessage");
    message.textContent = `Found item saved with tracking code ${response.data.trackingCode}.`;
    message.classList.remove("hidden");
    this.reset();
  } catch (error) {
    alert(error.message);
  }
});
</script>
</body>
</html>
