<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Back2You | Search Items</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/ambient-bg.css"/>
<script>
tailwind.config={theme:{extend:{colors:{deep:"#020617",text:"#f5f7fb",muted:"#8e97ab",blueglow:"#4f7cff",violetglow:"#8b3dff",cyanglow:"#33d2ff"},fontFamily:{sans:["Outfit","sans-serif"]},boxShadow:{panel:"0 30px 90px rgba(0,0,0,.55)",glow:"0 0 38px rgba(79,124,255,.22)"}}}}
</script>
<style>
  :root{color-scheme:dark}
  body{font-family:"Outfit",sans-serif;background:radial-gradient(circle at 10% 8%,rgba(79,124,255,.28),transparent 24%),radial-gradient(circle at 82% 86%,rgba(139,61,255,.24),transparent 26%),radial-gradient(circle at 50% 52%,rgba(51,210,255,.1),transparent 28%),linear-gradient(180deg,#121742 0%,#15133b 38%,#171227 100%);overflow-x:hidden}
  .glass{background:rgba(18,22,50,.7);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08)}
  .chip-active{background:rgba(79,124,255,.16);border-color:rgba(79,124,255,.35);color:#fff}
  .action-pill{position:relative;display:inline-flex;align-items:center;gap:.75rem;width:100%;max-width:220px;padding:.32rem .32rem .32rem 1rem;border-radius:999px;transition:transform .25s ease,box-shadow .25s ease}
  .action-pill:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(79,124,255,.18)}
  .action-pill__label{flex:1;text-align:center}
  .action-pill__icon{display:inline-flex;height:2.5rem;width:2.5rem;align-items:center;justify-content:center;border-radius:999px;transition:transform .28s ease}
  .action-pill:hover .action-pill__icon{transform:translateX(4px) scale(1.04)}
  .back-pill{display:inline-flex;height:3rem;width:3rem;align-items:center;justify-content:center;border-radius:999px;border:1px solid rgba(255,255,255,.09);background:rgba(5,8,20,.52);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 26px rgba(0,0,0,.24);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:transform .25s ease,border-color .25s ease,background-color .25s ease,box-shadow .25s ease}
  .back-pill:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.18);background:rgba(8,12,28,.72);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 14px 30px rgba(0,0,0,.32)}
  .back-pill__icon{display:inline-flex;align-items:center;justify-content:center;transition:transform .25s ease}
  .back-pill:hover .back-pill__icon{transform:translateX(-2px)}
  .back-pill__label{display:none}
  @media (max-width:640px){.back-pill{height:2.75rem;width:2.75rem}}
</style>
</head>
<body class="app-stripes min-h-screen text-text">
<header class="border-b border-white/8 bg-[#13183f]/70 backdrop-blur-xl">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-5 lg:px-8">
    <div class="flex items-center gap-4"><p class="text-2xl font-extrabold text-white">Back2You</p></div>
    <div class="hidden items-center gap-6 md:flex"><a href="index.html" class="text-base font-semibold text-text/75 transition hover:text-white">Home</a><a href="dashboard.html" class="rounded-full bg-white px-5 py-2.5 text-base font-bold text-deep">Dashboard</a></div>
  </div>
</header>
<main class="mx-auto max-w-7xl px-4 py-8 sm:px-5 lg:px-8">
  <section class="glass rounded-[1.75rem] p-6 shadow-panel sm:p-8">
    <div class="mb-8 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
      <div><div class="flex flex-col items-start gap-3 sm:flex-row sm:items-center"><a href="dashboard.html" class="back-pill sm:shrink-0" aria-label="Go back"><span class="back-pill__icon"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg></span><span class="back-pill__label">Back</span></a><div><p class="text-xs uppercase tracking-[0.24em] text-blueglow">Search Archive</p><h1 class="mt-3 text-3xl font-extrabold text-white sm:text-4xl">Search items and review matches.</h1></div></div></div>
      <div class="rounded-[1.4rem] border border-white/10 bg-white/5 px-4 py-3"><p class="text-xs uppercase tracking-[0.22em] text-text/55">Archive Status</p><p class="mt-2 text-xl font-bold text-white">642 indexed items</p></div>
    </div>
    <div class="grid gap-4 lg:grid-cols-[1fr_auto]">
      <input id="searchInput" type="text" placeholder="Search item name or case ID..." class="rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-white placeholder:text-muted focus:border-blueglow focus:ring-blueglow" onkeyup="searchItems()"/>
      <div class="rounded-[1.4rem] border border-white/10 bg-white/5 px-4 py-3"><p class="text-xs uppercase tracking-[0.22em] text-text/55">Current Filter</p><p id="currentFilter" class="mt-2 text-lg font-bold text-blueglow">All</p></div>
    </div>
    <div class="mt-5 flex flex-wrap gap-3">
      <button onclick="filterCategory('All',this)" class="chip chip-active rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm font-bold text-muted transition">All</button>
      <button onclick="filterCategory('Headphones',this)" class="chip rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm font-bold text-muted transition">Headphones</button>
      <button onclick="filterCategory('Notebook',this)" class="chip rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm font-bold text-muted transition">Notebook</button>
      <button onclick="filterCategory('Laptop',this)" class="chip rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm font-bold text-muted transition">Laptop</button>
      <button onclick="filterCategory('Mobile',this)" class="chip rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm font-bold text-muted transition">Mobile</button>
      <button onclick="filterCategory('Keys',this)" class="chip rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm font-bold text-muted transition">Keys</button>
    </div>
    <div id="results" class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3"></div>
  </section>
</main>
<script src="js/config.production.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
let items = [];
let currentCategory="All";
function statusBadge(status){if(status==="reported"||status==="still-searching")return"bg-white/8 text-white";if(status==="found")return"bg-blueglow/12 text-blueglow";return"bg-violetglow/12 text-violetglow";}
function displayItems(list){const container=document.getElementById("results");container.innerHTML="";if(!list.length){container.innerHTML='<div class="col-span-full rounded-[1.5rem] border border-white/10 bg-white/5 p-8 text-center text-muted">No items found.</div>';return;}list.forEach((item)=>{container.innerHTML+=`<article class="rounded-[1.5rem] border border-white/10 bg-white/5 p-5 transition duration-300 hover:-translate-y-1 hover:border-blueglow/25"><div class="flex items-center justify-between gap-4"><div><p class="text-xs uppercase tracking-[0.22em] text-text/50">${item.trackingCode}</p><h3 class="mt-2 text-xl font-bold text-white">${item.itemName}</h3></div><span class="rounded-full px-3 py-1 text-xs font-bold ${statusBadge(item.status)}">${item.status}</span></div><p class="mt-3 text-sm text-muted">${item.category}</p><a href="status.html?code=${encodeURIComponent(item.trackingCode)}" class="action-pill mt-5 bg-gradient-to-r from-blueglow to-violetglow text-white shadow-glow"><span class="action-pill__label text-sm font-bold">View Details</span><span class="action-pill__icon bg-white text-deep"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-6-6l6 6-6 6"/></svg></span></a></article>`;});}
function searchItems(){const text=document.getElementById("searchInput").value.toLowerCase();let filtered=items.filter((item)=>item.itemName.toLowerCase().includes(text)||item.trackingCode.toLowerCase().includes(text));if(currentCategory!=="All")filtered=filtered.filter((item)=>item.category===currentCategory);displayItems(filtered);}
function filterCategory(category,button){currentCategory=category;document.getElementById("currentFilter").textContent=category;document.querySelectorAll(".chip").forEach((chip)=>chip.classList.remove("chip-active"));button.classList.add("chip-active");searchItems();}

Back2YouAPI.request("/items/search")
  .then((response) => {
    items = response.data;
    displayItems(items);
  })
  .catch((error) => {
    document.getElementById("results").innerHTML = `<div class="col-span-full rounded-[1.5rem] border border-white/10 bg-white/5 p-8 text-center text-muted">${error.message}</div>`;
  });
</script>
</body>
</html>
