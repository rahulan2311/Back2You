<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Back2You | Feedback</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/ambient-bg.css"/>
<script>
tailwind.config={theme:{extend:{colors:{deep:"#020617",text:"#f5f7fb",muted:"#8e97ab",blueglow:"#4f7cff",violetglow:"#8b3dff",cyanglow:"#33d2ff"},fontFamily:{sans:["Outfit","sans-serif"]},boxShadow:{panel:"0 30px 90px rgba(0,0,0,.55)",glow:"0 0 38px rgba(79,124,255,.22)"}}}}
</script>
<style>
  :root{color-scheme:dark}
  body{font-family:"Outfit",sans-serif;background:radial-gradient(circle at 10% 8%,rgba(79,124,255,.28),transparent 24%),radial-gradient(circle at 82% 86%,rgba(139,61,255,.24),transparent 26%),radial-gradient(circle at 50% 52%,rgba(51,210,255,.1),transparent 28%),linear-gradient(180deg,#121742 0%,#15133b 38%,#171227 100%);overflow-x:hidden}
  .glass{background:rgba(18,22,50,.7);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08)}
  .action-pill{position:relative;display:inline-flex;align-items:center;gap:.75rem;width:100%;padding:.38rem .38rem .38rem 1.35rem;border-radius:999px;transition:transform .25s ease,box-shadow .25s ease}
  .action-pill:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(79,124,255,.18)}
  .action-pill__label{flex:1;text-align:center}
  .action-pill__icon{display:inline-flex;height:3rem;width:3rem;align-items:center;justify-content:center;border-radius:999px;transition:transform .28s ease}
  .action-pill:hover .action-pill__icon{transform:translateX(4px) scale(1.04)}
  .back-pill{display:inline-flex;height:3rem;width:3rem;align-items:center;justify-content:center;border-radius:999px;border:1px solid rgba(255,255,255,.09);background:rgba(5,8,20,.52);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 26px rgba(0,0,0,.24);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:transform .25s ease,border-color .25s ease,background-color .25s ease,box-shadow .25s ease}
  .back-pill:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.18);background:rgba(8,12,28,.72);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 14px 30px rgba(0,0,0,.32)}
  .back-pill__icon{display:inline-flex;align-items:center;justify-content:center;transition:transform .25s ease}
  .back-pill:hover .back-pill__icon{transform:translateX(-2px)}
  .back-pill__label{display:none}
  .feedback-stars{display:flex;gap:.65rem;flex-wrap:wrap}
  .feedback-star{display:inline-flex;align-items:center;justify-content:center;height:3rem;width:3rem;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(250,204,21,.38);font-size:1.55rem;transition:transform .2s ease,border-color .2s ease,background-color .2s ease,color .2s ease}
  .feedback-star:hover{transform:translateY(-2px);border-color:rgba(250,204,21,.55);color:#facc15}
  .feedback-star.is-active{border-color:rgba(250,204,21,.65);background:rgba(250,204,21,.12);color:#facc15}
  .feedback-status{display:none;margin-top:1rem;border-radius:1rem;padding:.9rem 1rem;font-size:.92rem;line-height:1.5}
  .feedback-status--error{display:block;border:1px solid rgba(251,113,133,.35);background:rgba(251,113,133,.12);color:#ffe4e6}
  .feedback-status--success{display:block;border:1px solid rgba(74,222,128,.3);background:rgba(74,222,128,.12);color:#dcfce7}
  @media (max-width:640px){.back-pill{height:2.75rem;width:2.75rem}}
</style>
</head>
<body class="app-stripes min-h-screen text-text">
<header class="border-b border-white/8 bg-[#13183f]/70 backdrop-blur-xl">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-5 lg:px-8">
    <div class="flex items-center gap-4"><p class="text-2xl font-extrabold text-white">Back2You</p></div>
    <div class="hidden items-center gap-6 md:flex"><a href="index.html" class="text-base font-semibold text-text/75 transition hover:text-white">Home</a><a href="dashboard.html" class="rounded-full bg-white px-5 py-2.5 text-base font-bold text-deep">Dashboard</a></div>
  </div>
</header>
<main class="mx-auto max-w-5xl px-4 py-8 sm:px-5 lg:px-8">
  <section class="grid gap-6 lg:grid-cols-[0.85fr_1.15fr]">
    <div class="glass rounded-[1.75rem] p-6 shadow-panel sm:p-8"><p class="text-xs uppercase tracking-[0.3em] text-blueglow">Feedback</p><h1 class="mt-4 text-3xl font-extrabold text-white sm:text-4xl">Collect useful comments on the recovery experience.</h1><p class="mt-4 text-sm leading-7 text-text/65 sm:text-base">Ask whether reporting was simple, whether updates were clear, and whether the final pickup felt reliable.</p></div>
    <form id="feedbackForm" class="glass rounded-[1.75rem] p-6 shadow-panel sm:p-8">
      <div class="flex flex-col items-start gap-3 sm:flex-row sm:items-center">
        <a href="dashboard.html" class="back-pill sm:shrink-0" aria-label="Go back"><span class="back-pill__icon"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg></span><span class="back-pill__label">Back</span></a>
        <h2 class="text-2xl font-bold text-white sm:text-3xl">Feedback Form</h2>
      </div>
      <div class="mt-5">
        <p class="text-sm font-semibold text-white">Rate your experience</p>
        <div id="feedbackStars" class="mt-3 feedback-stars" role="radiogroup" aria-label="Rate your experience">
          <button type="button" class="feedback-star" data-rating="1" aria-label="Rate 1 star">&#9733;</button>
          <button type="button" class="feedback-star" data-rating="2" aria-label="Rate 2 stars">&#9733;</button>
          <button type="button" class="feedback-star" data-rating="3" aria-label="Rate 3 stars">&#9733;</button>
          <button type="button" class="feedback-star is-active" data-rating="4" aria-label="Rate 4 stars">&#9733;</button>
          <button type="button" class="feedback-star is-active" data-rating="5" aria-label="Rate 5 stars">&#9733;</button>
        </div>
        <p id="feedbackRatingLabel" class="mt-3 text-sm text-text/65">Selected rating: 5/5</p>
        <div id="feedbackStatus" class="feedback-status"></div>
      </div>
      <div class="mt-6 space-y-4">
        <input id="feedbackName" class="w-full rounded-2xl border-white/10 bg-white/8 px-4 py-3.5 text-white placeholder:text-muted focus:border-blueglow focus:ring-blueglow" placeholder="Your Name" autocomplete="name"/>
        <textarea id="feedbackComment" rows="6" class="w-full rounded-[1.5rem] border-white/10 bg-white/8 px-4 py-3.5 text-white placeholder:text-muted focus:border-blueglow focus:ring-blueglow" placeholder="What worked well and what should change next?" required></textarea>
        <button type="submit" class="action-pill bg-gradient-to-r from-blueglow to-violetglow text-white shadow-glow"><span class="action-pill__label text-lg font-bold">Submit Feedback</span><span class="action-pill__icon bg-white text-deep"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-6-6l6 6-6 6"/></svg></span></button>
      </div>
    </form>
  </section>
</main>
<script src="js/config.production.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
const feedbackStars = Array.from(document.querySelectorAll("#feedbackStars .feedback-star"));
const feedbackRatingLabel = document.getElementById("feedbackRatingLabel");
const feedbackStatus = document.getElementById("feedbackStatus");
let selectedFeedbackRating = 5;

function renderFeedbackStars(rating) {
  feedbackStars.forEach((star) => {
    const starRating = Number(star.dataset.rating);
    star.classList.toggle("is-active", starRating <= rating);
    star.setAttribute("aria-checked", String(starRating === rating));
  });
  feedbackRatingLabel.textContent = "Selected rating: " + rating + "/5";
}

renderFeedbackStars(selectedFeedbackRating);
feedbackStars.forEach((star) => {
  star.addEventListener("click", () => {
    selectedFeedbackRating = Number(star.dataset.rating);
    renderFeedbackStars(selectedFeedbackRating);
  });
});

document.getElementById("feedbackForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  feedbackStatus.className = "feedback-status";
  feedbackStatus.textContent = "";

  const comment = document.getElementById("feedbackComment").value.trim();
  if (!comment) {
    feedbackStatus.textContent = "Please enter your feedback before submitting.";
    feedbackStatus.className = "feedback-status feedback-status--error";
    return;
  }

  try {
    await Back2YouAPI.request("/feedback", {
      method: "POST",
      body: JSON.stringify({
        name: document.getElementById("feedbackName").value.trim(),
        rating: selectedFeedbackRating,
        comment
      })
    });

    event.currentTarget.reset();
    selectedFeedbackRating = 5;
    renderFeedbackStars(selectedFeedbackRating);
    feedbackStatus.textContent = "Feedback submitted successfully.";
    feedbackStatus.className = "feedback-status feedback-status--success";
  } catch (error) {
    feedbackStatus.textContent = error.message;
    feedbackStatus.className = "feedback-status feedback-status--error";
  }
});
</script>
</body>
</html>
